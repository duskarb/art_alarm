work_summary: |
  Glimpse — critical system/media art. Two local LLMs converse, pen plotter (Roland DXY-880)
  inscribes each utterance at random coordinates on paper. Themes: AI dialogue, interpassivity,
  performance, conceptual art, human-AI interaction, language as material, visible irony of prompting.

